openapi: 3.0.0
info:
  title: SN-API
  description: Storage Node API for Lumera Cascade operations
  version: 1.0.0
servers:
  - url: https://api.example.com
    description: Storage Node API server
paths:
  /api/v1/actions/cascade:
    post:
      summary: Start Cascade Action
      description: Initiates a new Cascade storage action
      operationId: startCascade
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                    description: Unique identifier for the task
  /api/v1/actions/cascade/{action_id}/downloads:
    post:
      summary: Request Cascade Download
      description: Request a download for a specific action
      operationId: requestCascadeDownload
      parameters:
        - name: action_id
          in: path
          required: true
          schema:
            type: string
          description: Action ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                    description: Download task identifier
  /api/v1/actions/cascade/tasks/{task_id}:
    get:
      summary: Get Cascade Task
      description: Retrieve task information
      operationId: getCascadeTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: Task ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                  status:
                    type: string
                  progress:
                    type: number
  /api/v1/actions/cascade/tasks/{task_id}/status:
    get:
      summary: Get Cascade Task Status
      description: Retrieve the status of a task
      operationId: getCascadeTaskStatus
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: Task ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, processing, completed, failed]
                  progress:
                    type: number
  /api/v1/downloads/cascade/{task_id}/file:
    get:
      summary: Download Cascade File
      description: Download the file associated with a task
      operationId: downloadCascadeFile
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: Task ID
      responses:
        '200':
          description: Successful response
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary